name = "pingbase"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Cron triggers — runs every minute
# The worker itself decides which monitors to check based on interval
[triggers]
crons = ["* * * * *"]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "pingbase-db"
database_id = "daae70d1-e4fe-4e48-b3c3-51f2e704e4b4"

# KV namespace bindings
[[kv_namespaces]]
binding = "STATUS_KV"
id = "e6e202d9a4fc46e0af000d7f4bf07086"

[[kv_namespaces]]
binding = "BUFFER_KV"
id = "bce4c41d62ec468db44a0f75c3d28871"

[vars]
ALERT_EMAIL_FROM = "alerts@pingbase.dev"
APP_URL = "https://pingbase.dev"
# RESEND_API_KEY set via wrangler secret
# JWT_SECRET set via wrangler secret put JWT_SECRET
#
# Stripe secrets — set via wrangler secret put:
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put STRIPE_PRO_MONTHLY_PRICE
#   wrangler secret put STRIPE_PRO_ANNUAL_PRICE
#   wrangler secret put STRIPE_TEAM_MONTHLY_PRICE
#   wrangler secret put STRIPE_TEAM_ANNUAL_PRICE
