<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PingBase - Sign In</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-card { position: relative; }
    .login-tabs {
      display: flex;
      border-bottom: 1px solid var(--color-border);
      margin: -2.5rem -2rem 1.5rem -2rem;
      padding: 0 2rem;
    }
    .login-tab {
      flex: 1;
      padding: 0.75rem 0;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .login-tab:hover { color: var(--color-text); }
    .login-tab.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }
    .form-group { margin-bottom: 1rem; text-align: left; }
    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    .login-error {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FECACA;
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
      margin-bottom: 1rem;
      display: none;
    }
    .login-error.visible { display: block; }
    input[type="password"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      font-size: 0.9375rem;
      font-family: inherit;
      background: var(--color-surface);
      color: var(--color-text);
      transition: border-color 0.15s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
  </style>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-icon">P</span>
        <h1>PingBase</h1>
      </div>
      <p class="login-subtitle">Uptime monitoring that just works.</p>

      <div class="login-tabs">
        <button class="login-tab active" data-tab="login">Sign In</button>
        <button class="login-tab" data-tab="signup">Create Account</button>
      </div>

      <div id="login-error" class="login-error"></div>

      <form id="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min 8 characters" required autocomplete="current-password" minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">Sign In</button>
      </form>
    </div>
  </div>

  <script>
    (function () {
      var API_BASE = window.PINGBASE_API_BASE || '/api';
      var currentTab = 'login';

      // Already authenticated? Go to dashboard
      if (localStorage.getItem('pingbase_token')) {
        window.location.href = 'index.html';
        return;
      }

      // Tab switching
      var tabs = document.querySelectorAll('.login-tab');
      var submitBtn = document.getElementById('submit-btn');
      var passwordInput = document.getElementById('password');

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          tabs.forEach(function (t) { t.classList.remove('active'); });
          tab.classList.add('active');
          currentTab = tab.dataset.tab;
          submitBtn.textContent = currentTab === 'login' ? 'Sign In' : 'Create Account';
          passwordInput.autocomplete = currentTab === 'login' ? 'current-password' : 'new-password';
          hideError();
        });
      });

      function showError(msg) {
        var el = document.getElementById('login-error');
        el.textContent = msg;
        el.classList.add('visible');
      }

      function hideError() {
        document.getElementById('login-error').classList.remove('visible');
      }

      document.getElementById('auth-form').addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        if (!email || !password) {
          showError('Email and password are required.');
          return;
        }
        if (password.length < 8) {
          showError('Password must be at least 8 characters.');
          return;
        }

        var endpoint = currentTab === 'login' ? '/auth/login' : '/auth/signup';
        submitBtn.disabled = true;
        submitBtn.textContent = currentTab === 'login' ? 'Signing in...' : 'Creating account...';

        fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        })
        .then(function (res) {
          return res.json().then(function (data) {
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
          });
        })
        .then(function (data) {
          localStorage.setItem('pingbase_token', data.token);
          localStorage.setItem('pingbase_email', data.user.email);
          localStorage.setItem('pingbase_tier', data.user.tier);
          window.location.href = 'index.html';
        })
        .catch(function (err) {
          showError(err.message);
          submitBtn.disabled = false;
          submitBtn.textContent = currentTab === 'login' ? 'Sign In' : 'Create Account';
        });
      });
    })();
  </script>
</body>
</html>
