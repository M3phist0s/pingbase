<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PingBase - Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo-icon">P</span>
      <h1>PingBase</h1>
    </div>
    <div class="header-right">
      <span class="header-user" id="header-user"></span>
      <button class="header-logout" id="btn-logout">Log out</button>
    </div>
  </header>

  <!-- Main content — rendered by app.js -->
  <main class="app-main" id="app-content">
    <div class="loading">Loading monitors...</div>
  </main>

  <!-- Add Monitor Modal -->
  <div class="modal-overlay hidden" id="add-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Add Monitor</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="add-form">
        <div class="modal-body">
          <div class="form-group">
            <label for="monitor-name">Name</label>
            <input type="text" id="monitor-name" placeholder="My Website" required>
          </div>
          <div class="form-group">
            <label for="monitor-url">URL</label>
            <input type="url" id="monitor-url" placeholder="https://example.com" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="monitor-method">Method</label>
              <select id="monitor-method">
                <option value="GET" selected>GET</option>
                <option value="HEAD">HEAD</option>
                <option value="POST">POST</option>
              </select>
            </div>
            <div class="form-group">
              <label for="monitor-expected-status">Expected Status</label>
              <input type="number" id="monitor-expected-status" value="200" min="100" max="599">
            </div>
          </div>
          <div class="form-group">
            <label for="monitor-interval">Check Interval (seconds)</label>
            <select id="monitor-interval">
              <option value="60">Every 1 minute</option>
              <option value="300" selected>Every 5 minutes</option>
              <option value="600">Every 10 minutes</option>
              <option value="1800">Every 30 minutes</option>
              <option value="3600">Every 1 hour</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Monitor</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
